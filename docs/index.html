<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>UniftUI Documentation</title>
  <meta name="description" content="Developer documentation for UniftUI, a declarative UI framework for Unity uGUI.">
  <link rel="icon" href="./assets/uniftui-docs-icon.png" type="image/png">
  <script>
    (() => {
      const key = "uniftui-docs-theme";
      const choices = new Set(["system", "light", "dark"]);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      let theme = "system";

      try {
        const stored = localStorage.getItem(key);
        if (choices.has(stored)) theme = stored;
      } catch {
        theme = "system";
      }

      document.documentElement.dataset.theme = theme;
      document.documentElement.dataset.resolvedTheme = theme === "system"
        ? (prefersDark ? "dark" : "light")
        : theme;
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <button class="mobile-menu-button" type="button" aria-controls="symbol-list" aria-expanded="false" aria-label="Menu">
      <svg viewBox="0 0 18 18" aria-hidden="true" focusable="false">
        <path d="M3 5h12M3 9h12M3 13h12"/>
      </svg>
    </button>

    <a class="brand" href="#/overview" aria-label="UniftUI documentation home">
      <img class="brand-logo" src="./assets/uniftui-docs-icon.png" alt="">
      <span>
        <strong class="brand-title">UniftUI</strong>
        <small>Documentation</small>
      </span>
    </a>

    <label class="search" for="search-input">
      <span class="search-icon" aria-hidden="true">/</span>
      <input id="search-input" type="search" placeholder="Search symbols" autocomplete="off">
    </label>

    <div class="language-toggle" aria-label="Language">
      <button type="button" data-lang="ja">日本語</button>
      <button type="button" data-lang="en">English</button>
    </div>

    <div class="theme-toggle" aria-label="Theme">
      <button type="button" data-theme-choice="system">System</button>
      <button type="button" data-theme-choice="light">Light</button>
      <button type="button" data-theme-choice="dark">Dark</button>
    </div>

    <nav class="topnav" aria-label="Repository links">
      <a class="github-link" href="https://github.com/nnnnnnn0090/UniftUI" rel="noreferrer" aria-label="GitHub repository">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
      </a>
    </nav>
  </header>

  <div class="mobile-scrim" hidden></div>

  <div class="shell">
    <aside class="sidebar" aria-label="Symbols">
      <div class="sidebar-title">UniftUI</div>
      <div id="symbol-list" class="symbol-list"></div>
    </aside>

    <main class="content" id="main" tabindex="-1">
      <div id="article"></div>
    </main>

    <aside class="toc" aria-label="On this page">
      <div class="toc-title">On This Page</div>
      <nav id="toc-list"></nav>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
